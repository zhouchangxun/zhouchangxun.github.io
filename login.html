<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        background: #1a1a2e;
        overflow: hidden;
        height: 100vh;
      }

      /* ============ LOGIN PAGE ============ */
      #login-page {
        display: grid;
        grid-template-columns: 1fr 1fr;
        height: 100vh;
      }

      /* Left Panel */
      .left-panel {
        position: relative;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        background: linear-gradient(
          135deg,
          #d4d0dc 0%,
          #c8c4d0 50%,
          #bbb7c5 100%
        );
        padding: 40px 48px;
        overflow: hidden;
      }

      .left-panel .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 16px;
        font-weight: 600;
        color: #fff;
        z-index: 10;
        position: relative;
      }

      .left-panel .logo svg {
        width: 28px;
        height: 28px;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(8px);
        padding: 4px;
        border-radius: 6px;
      }

      .characters-wrapper {
        position: relative;
        z-index: 10;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        height: 420px;
      }

      .left-panel .footer-links {
        display: flex;
        gap: 28px;
        font-size: 13px;
        color: rgba(80, 70, 90, 0.7);
        z-index: 10;
        position: relative;
      }

      .left-panel .footer-links a {
        color: inherit;
        text-decoration: none;
        transition: color 0.2s;
      }

      .left-panel .footer-links a:hover {
        color: #333;
      }

      /* Decorative blurs */
      .left-panel::after {
        content: "";
        position: absolute;
        top: 20%;
        right: 15%;
        width: 260px;
        height: 260px;
        background: rgba(180, 170, 200, 0.25);
        border-radius: 50%;
        filter: blur(80px);
      }

      .left-panel::before {
        content: "";
        position: absolute;
        bottom: 15%;
        left: 10%;
        width: 350px;
        height: 350px;
        background: rgba(200, 195, 210, 0.2);
        border-radius: 50%;
        filter: blur(100px);
      }

      /* Right Panel */
      .right-panel {
        display: flex;
        align-items: center;
        justify-content: center;
        background: #fff;
        padding: 40px;
      }

      .form-container {
        width: 100%;
        max-width: 400px;
      }

      /* Sparkle icon */
      .sparkle-icon {
        display: flex;
        justify-content: center;
        margin-bottom: 24px;
      }

      .sparkle-icon svg {
        width: 32px;
        height: 32px;
      }

      .form-header {
        text-align: center;
        margin-bottom: 36px;
      }

      .form-header h1 {
        font-size: 28px;
        font-weight: 700;
        color: #1a1a2e;
        letter-spacing: -0.5px;
        margin-bottom: 6px;
      }

      .form-header p {
        font-size: 14px;
        color: #888;
      }

      /* Form fields */
      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        font-size: 13px;
        font-weight: 500;
        color: #333;
        margin-bottom: 8px;
      }

      .form-group .input-wrapper {
        position: relative;
      }

      .form-group input {
        width: 100%;
        height: 48px;
        border: none;
        border-bottom: 1.5px solid #e0e0e0;
        padding: 0 40px 0 0;
        font-size: 15px;
        font-family: inherit;
        color: #1a1a2e;
        background: transparent;
        outline: none;
        transition: border-color 0.3s;
      }

      .form-group input:focus {
        border-bottom-color: #5b21b6;
      }

      .form-group input::placeholder {
        color: #ccc;
      }

      .form-group input[type="password"]:not(:placeholder-shown) {
        font-family: inherit;
        letter-spacing: 2px;
      }

      .toggle-password {
        position: absolute;
        right: 0;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        color: #666;
        padding: 6px;
        transition: color 0.2s;
      }

      .toggle-password:hover {
        color: #333;
      }

      /* Remember & Forgot */
      .form-options {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 24px;
      }

      .remember-me {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        color: #555;
        cursor: pointer;
      }

      .remember-me input[type="checkbox"] {
        width: 16px;
        height: 16px;
        accent-color: #5b21b6;
        cursor: pointer;
      }

      .forgot-link {
        font-size: 13px;
        color: #5b21b6;
        text-decoration: none;
        font-weight: 500;
        transition: opacity 0.2s;
      }

      .forgot-link:hover {
        opacity: 0.8;
      }

      /* Buttons */
      .btn-login {
        position: relative;
        width: 100%;
        height: 50px;
        border-radius: 25px;
        border: 1.5px solid #1a1a2e;
        background: #1a1a2e;
        color: #fff;
        font-size: 15px;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        overflow: hidden;
        margin-bottom: 14px;
        transition: all 0.3s;
      }

      .btn-login .btn-text {
        display: inline-block;
        transition: all 0.3s;
      }

      .btn-login .btn-hover-content {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        background: #5b21b6;
        color: #fff;
        opacity: 0;
        transition: all 0.3s;
        border-radius: 25px;
      }

      .btn-login:hover .btn-text {
        transform: translateX(40px);
        opacity: 0;
      }

      .btn-login:hover .btn-hover-content {
        opacity: 1;
      }

      .btn-google {
        position: relative;
        width: 100%;
        height: 50px;
        border-radius: 25px;
        border: 1.5px solid #e0e0e0;
        background: #f5f5f5;
        color: #333;
        font-size: 15px;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        overflow: hidden;
        transition: all 0.3s;
      }

      .btn-google .btn-text {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        transition: all 0.3s;
      }

      .btn-google .btn-hover-content {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        background: #5b21b6;
        color: #fff;
        opacity: 0;
        transition: all 0.3s;
        border-radius: 25px;
      }

      .btn-google:hover .btn-text {
        transform: translateX(40px);
        opacity: 0;
      }

      .btn-google:hover .btn-hover-content {
        opacity: 1;
      }

      .google-icon {
        width: 18px;
        height: 18px;
      }

      /* Sign up link */
      .signup-link {
        text-align: center;
        font-size: 13px;
        color: #888;
        margin-top: 32px;
      }

      .signup-link a {
        color: #1a1a2e;
        font-weight: 600;
        text-decoration: none;
      }

      .signup-link a:hover {
        text-decoration: underline;
      }

      /* ============ ANIMATED CHARACTERS ============ */
      .characters-scene {
        position: relative;
        width: 480px;
        height: 360px;
      }

      /* Character base styles */
      .character {
        position: absolute;
        bottom: 0;
        transition: all 0.7s ease-in-out;
        transform-origin: bottom center;
      }

      /* Purple rectangle */
      .char-purple {
        left: 60px;
        width: 170px;
        height: 370px;
        background: #6c3ff5;
        border-radius: 10px 10px 0 0;
        z-index: 1;
      }

      /* Black rectangle */
      .char-black {
        left: 220px;
        width: 115px;
        height: 290px;
        background: #2d2d2d;
        border-radius: 8px 8px 0 0;
        z-index: 2;
      }

      /* Orange semi-circle */
      .char-orange {
        left: 0;
        width: 230px;
        height: 190px;
        background: #ff9b6b;
        border-radius: 115px 115px 0 0;
        z-index: 3;
      }

      /* Yellow rounded */
      .char-yellow {
        left: 290px;
        width: 135px;
        height: 215px;
        background: #e8d754;
        border-radius: 68px 68px 0 0;
        z-index: 4;
      }

      /* Eyes container */
      .eyes {
        position: absolute;
        display: flex;
        transition: all 0.7s ease-in-out;
      }

      /* Eyeball (white with pupil) */
      .eyeball {
        border-radius: 50%;
        background: white;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: height 0.15s ease;
        overflow: hidden;
      }

      /* Pupil */
      .pupil {
        border-radius: 50%;
        background: #2d2d2d;
        transition: transform 0.1s ease-out;
      }

      /* Bare pupil (no white eyeball) */
      .bare-pupil {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #2d2d2d;
        transition: transform 0.7s ease-in-out;
      }

      /* Yellow mouth */
      .yellow-mouth {
        position: absolute;
        width: 50px;
        height: 4px;
        background: #2d2d2d;
        border-radius: 2px;
        transition: all 0.7s ease-in-out;
      }

      /* Shake-head: smooth left-right oscillation on face parts */
      @keyframes shakeHead {
        0%,
        100% {
          translate: 0 0;
        }
        10% {
          translate: -9px 0;
        }
        20% {
          translate: 7px 0;
        }
        30% {
          translate: -6px 0;
        }
        40% {
          translate: 5px 0;
        }
        50% {
          translate: -4px 0;
        }
        60% {
          translate: 3px 0;
        }
        70% {
          translate: -2px 0;
        }
        80% {
          translate: 1px 0;
        }
        90% {
          translate: -0.5px 0;
        }
      }

      .eyes.shake-head,
      .yellow-mouth.shake-head,
      .orange-mouth.shake-head {
        animation: shakeHead 0.8s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
      }

      /* Sad mouth (curved down) for orange character on error */
      .orange-mouth {
        position: absolute;
        width: 28px;
        height: 14px;
        border: 3px solid #2d2d2d;
        border-top: none;
        border-radius: 0 0 14px 14px;
        opacity: 0;
        transition: all 0.7s ease-in-out;
      }

      .orange-mouth.visible {
        opacity: 1;
      }

      /* Error styles */
      .error-msg {
        display: none;
        padding: 10px 14px;
        font-size: 13px;
        color: #dc2626;
        background: rgba(220, 38, 38, 0.08);
        border: 1px solid rgba(220, 38, 38, 0.2);
        border-radius: 10px;
        margin-bottom: 16px;
      }

      .form-group input.error {
        border-bottom-color: #dc2626;
      }

      .form-group label.error-label {
        color: #dc2626;
      }

      /* Responsive */
      @media (max-width: 900px) {
        #login-page {
          grid-template-columns: 1fr;
        }
        .left-panel {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <!-- Login Page -->
    <div id="login-page">
      <!-- Left Panel -->
      <div class="left-panel">
        <div class="logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
            <path d="M12 2L15 9H9L12 2Z" />
            <path d="M12 22L9 15H15L12 22Z" />
            <path d="M2 12L9 9V15L2 12Z" />
            <path d="M22 12L15 15V9L22 12Z" />
          </svg>
          <span>CareerCompass</span>
        </div>
        <div class="characters-wrapper">
          <div class="characters-scene" id="characters-scene">
            <!-- Purple character -->
            <div class="character char-purple" id="char-purple">
              <div
                class="eyes"
                id="purple-eyes"
                style="left: 45px; top: 40px; gap: 28px"
              >
                <div
                  class="eyeball"
                  id="purple-eye-l"
                  style="width: 18px; height: 18px"
                >
                  <div
                    class="pupil"
                    id="purple-pupil-l"
                    style="width: 7px; height: 7px"
                  ></div>
                </div>
                <div
                  class="eyeball"
                  id="purple-eye-r"
                  style="width: 18px; height: 18px"
                >
                  <div
                    class="pupil"
                    id="purple-pupil-r"
                    style="width: 7px; height: 7px"
                  ></div>
                </div>
              </div>
            </div>
            <!-- Black character -->
            <div class="character char-black" id="char-black">
              <div
                class="eyes"
                id="black-eyes"
                style="left: 26px; top: 32px; gap: 20px"
              >
                <div
                  class="eyeball"
                  id="black-eye-l"
                  style="width: 16px; height: 16px"
                >
                  <div
                    class="pupil"
                    id="black-pupil-l"
                    style="width: 6px; height: 6px"
                  ></div>
                </div>
                <div
                  class="eyeball"
                  id="black-eye-r"
                  style="width: 16px; height: 16px"
                >
                  <div
                    class="pupil"
                    id="black-pupil-r"
                    style="width: 6px; height: 6px"
                  ></div>
                </div>
              </div>
            </div>
            <!-- Orange character -->
            <div class="character char-orange" id="char-orange">
              <div
                class="eyes"
                id="orange-eyes"
                style="left: 82px; top: 90px; gap: 28px"
              >
                <div class="bare-pupil" id="orange-pupil-l"></div>
                <div class="bare-pupil" id="orange-pupil-r"></div>
              </div>
              <div
                class="orange-mouth"
                id="orange-mouth"
                style="left: 90px; top: 120px"
              ></div>
            </div>
            <!-- Yellow character -->
            <div class="character char-yellow" id="char-yellow">
              <div
                class="eyes"
                id="yellow-eyes"
                style="left: 52px; top: 40px; gap: 20px"
              >
                <div class="bare-pupil" id="yellow-pupil-l"></div>
                <div class="bare-pupil" id="yellow-pupil-r"></div>
              </div>
              <div
                class="yellow-mouth"
                id="yellow-mouth"
                style="left: 40px; top: 88px"
              ></div>
            </div>
          </div>
        </div>
        <div class="footer-links">
          <a href="#">Privacy Policy</a>
          <a href="#">Terms of Service</a>
          <a href="#">Contact</a>
        </div>
      </div>

      <!-- Right Panel -->
      <div class="right-panel">
        <div class="form-container">
          <div class="sparkle-icon">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path d="M12 2L13.5 9H10.5L12 2Z" fill="#1a1a2e" />
              <path d="M12 22L10.5 15H13.5L12 22Z" fill="#1a1a2e" />
              <path d="M2 12L9 10.5V13.5L2 12Z" fill="#1a1a2e" />
              <path d="M22 12L15 13.5V10.5L22 12Z" fill="#1a1a2e" />
            </svg>
          </div>
          <div class="form-header">
            <h1>Welcome back!</h1>
            <p>Please enter your details</p>
          </div>

          <form id="login-form" onsubmit="return false;">
            <div class="form-group">
              <label id="email-label" for="email">Email</label>
              <div class="input-wrapper">
                <input
                  type="email"
                  id="email"
                  placeholder="you@example.com"
                  autocomplete="off"
                />
              </div>
            </div>

            <div class="form-group">
              <label id="password-label" for="password">Password</label>
              <div class="input-wrapper">
                <input type="password" id="password" placeholder="••••••••" />
                <button
                  type="button"
                  class="toggle-password"
                  id="toggle-password"
                >
                  <svg
                    id="eye-icon"
                    width="20"
                    height="20"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <path
                      d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"
                    ></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                  <svg
                    id="eye-off-icon"
                    width="20"
                    height="20"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    style="display: none"
                  >
                    <path
                      d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"
                    ></path>
                    <line x1="1" y1="1" x2="23" y2="23"></line>
                  </svg>
                </button>
              </div>
            </div>

            <div class="form-options">
              <label class="remember-me">
                <input type="checkbox" checked /> Remember for 30 days
              </label>
              <a href="#" class="forgot-link">Forgot password?</a>
            </div>

            <div class="error-msg" id="error-msg"></div>

            <button type="submit" class="btn-login" id="btn-login">
              <span class="btn-text">Log In</span>
              <div class="btn-hover-content">
                <span>Log In</span>
                <svg
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <line x1="5" y1="12" x2="19" y2="12" />
                  <polyline points="12 5 19 12 12 19" />
                </svg>
              </div>
            </button>

            <button type="button" class="btn-google" id="btn-google">
              <span class="btn-text">
                <svg
                  class="google-icon"
                  viewBox="0 0 24 24"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <path
                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"
                    fill="#4285F4"
                  />
                  <path
                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                    fill="#34A853"
                  />
                  <path
                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A11.96 11.96 0 001 12c0 1.94.46 3.77 1.18 5.07l3.66-2.84v-.14z"
                    fill="#FBBC05"
                  />
                  <path
                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                    fill="#EA4335"
                  />
                </svg>
                Log in with Google
              </span>
              <div class="btn-hover-content">
                <span>Log in with Google</span>
                <svg
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <line x1="5" y1="12" x2="19" y2="12" />
                  <polyline points="12 5 19 12 12 19" />
                </svg>
              </div>
            </button>
          </form>

          <div class="signup-link">
            Don't have an account? <a href="#">Sign Up</a>
          </div>
        </div>
      </div>
    </div>

    <script>
      // ============ PASSWORD TOGGLE ============
      const passwordInput = document.getElementById("password");
      const emailInput = document.getElementById("email");
      const toggleBtn = document.getElementById("toggle-password");
      const eyeIcon = document.getElementById("eye-icon");
      const eyeOffIcon = document.getElementById("eye-off-icon");
      let showPassword = false;
      let isLoginError = false;

      toggleBtn.addEventListener("click", () => {
        showPassword = !showPassword;
        passwordInput.type = showPassword ? "text" : "password";
        eyeIcon.style.display = showPassword ? "none" : "block";
        eyeOffIcon.style.display = showPassword ? "block" : "none";
        updateCharacters();
      });

      // ============ MOUSE TRACKING & CHARACTER ANIMATION ============
      let mouseX = 0,
        mouseY = 0;
      let isTyping = false;
      let isLookingAtEachOther = false;
      let isPurpleBlinking = false;
      let isBlackBlinking = false;
      let isPurplePeeking = false;
      let typingTimer = null;

      document.addEventListener("mousemove", (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
        if (!isTyping && !isLoginError) updateCharacters();
      });

      let isPasswordFocused = false;

      // Typing detection
      emailInput.addEventListener("focus", () => {
        setTyping(true);
      });
      emailInput.addEventListener("blur", () => {
        setTyping(false);
      });
      emailInput.addEventListener("input", () => {
        updateCharacters();
      });
      passwordInput.addEventListener("focus", () => {
        isPasswordFocused = true;
        updateCharacters();
      });
      passwordInput.addEventListener("blur", () => {
        isPasswordFocused = false;
        updateCharacters();
      });
      passwordInput.addEventListener("input", () => {
        updateCharacters();
      });

      function setTyping(typing) {
        isTyping = typing;
        if (typing) {
          isLookingAtEachOther = true;
          clearTimeout(typingTimer);
          typingTimer = setTimeout(() => {
            isLookingAtEachOther = false;
            updateCharacters();
          }, 800);
        } else {
          isLookingAtEachOther = false;
        }
        updateCharacters();
      }

      // Blinking
      function scheduleBlinkPurple() {
        setTimeout(
          () => {
            isPurpleBlinking = true;
            updateCharacters();
            setTimeout(() => {
              isPurpleBlinking = false;
              updateCharacters();
              scheduleBlinkPurple();
            }, 150);
          },
          Math.random() * 4000 + 3000,
        );
      }

      function scheduleBlinkBlack() {
        setTimeout(
          () => {
            isBlackBlinking = true;
            updateCharacters();
            setTimeout(() => {
              isBlackBlinking = false;
              updateCharacters();
              scheduleBlinkBlack();
            }, 150);
          },
          Math.random() * 4000 + 3000,
        );
      }

      scheduleBlinkPurple();
      scheduleBlinkBlack();

      // Purple peeking when password is visible
      function schedulePeek() {
        if (passwordInput.value.length > 0 && showPassword) {
          setTimeout(
            () => {
              if (passwordInput.value.length > 0 && showPassword) {
                isPurplePeeking = true;
                updateCharacters();
                setTimeout(() => {
                  isPurplePeeking = false;
                  updateCharacters();
                  schedulePeek();
                }, 800);
              }
            },
            Math.random() * 3000 + 2000,
          );
        }
      }

      // Watch for password visibility changes to trigger peeking
      toggleBtn.addEventListener("click", () => {
        if (showPassword) schedulePeek();
      });

      // Calculate character position based on mouse
      function calcPosition(el) {
        const rect = el.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 3;
        const dx = mouseX - cx;
        const dy = mouseY - cy;
        const faceX = Math.max(-15, Math.min(15, dx / 20));
        const faceY = Math.max(-10, Math.min(10, dy / 30));
        const bodySkew = Math.max(-6, Math.min(6, -dx / 120));
        return { faceX, faceY, bodySkew };
      }

      function calcPupilOffset(el, maxDist) {
        const rect = el.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        const dx = mouseX - cx;
        const dy = mouseY - cy;
        const dist = Math.min(Math.sqrt(dx * dx + dy * dy), maxDist);
        const angle = Math.atan2(dy, dx);
        return { x: Math.cos(angle) * dist, y: Math.sin(angle) * dist };
      }

      function updateCharacters() {
        const purple = document.getElementById("char-purple");
        const black = document.getElementById("char-black");
        const orange = document.getElementById("char-orange");
        const yellow = document.getElementById("char-yellow");

        const purplePos = calcPosition(purple);
        const blackPos = calcPosition(black);
        const orangePos = calcPosition(orange);
        const yellowPos = calcPosition(yellow);

        const pwdLen = passwordInput.value.length;
        const isShowingPwd = pwdLen > 0 && showPassword;
        // Characters look away when password field is focused (hiding password)
        const isLookingAway = isPasswordFocused && !showPassword;

        // ---- Purple body ----
        if (isShowingPwd) {
          purple.style.transform = "skewX(0deg)";
          purple.style.height = "370px";
        } else if (isLookingAway) {
          // Tilt away from the form (lean left)
          purple.style.transform = "skewX(-14deg) translateX(-20px)";
          purple.style.height = "410px";
        } else if (isTyping) {
          purple.style.transform = `skewX(${(purplePos.bodySkew || 0) - 12}deg) translateX(40px)`;
          purple.style.height = "410px";
        } else {
          purple.style.transform = `skewX(${purplePos.bodySkew}deg)`;
          purple.style.height = "370px";
        }

        // Purple eyes
        const purpleEyes = document.getElementById("purple-eyes");
        const purpleEyeL = document.getElementById("purple-eye-l");
        const purpleEyeR = document.getElementById("purple-eye-r");
        const purplePupilL = document.getElementById("purple-pupil-l");
        const purplePupilR = document.getElementById("purple-pupil-r");

        purpleEyeL.style.height = isPurpleBlinking ? "2px" : "18px";
        purpleEyeR.style.height = isPurpleBlinking ? "2px" : "18px";

        if (isLoginError) {
          // Sad look down-left
          purpleEyes.style.left = "30px";
          purpleEyes.style.top = "55px";
          purplePupilL.style.transform = "translate(-3px, 4px)";
          purplePupilR.style.transform = "translate(-3px, 4px)";
        } else if (isLookingAway) {
          // Eyes look up-left (away from form)
          purpleEyes.style.left = "20px";
          purpleEyes.style.top = "25px";
          purplePupilL.style.transform = "translate(-5px, -5px)";
          purplePupilR.style.transform = "translate(-5px, -5px)";
        } else if (isShowingPwd) {
          purpleEyes.style.left = "20px";
          purpleEyes.style.top = "35px";
          const px = isPurplePeeking ? 4 : -4;
          const py = isPurplePeeking ? 5 : -4;
          purplePupilL.style.transform = `translate(${px}px, ${py}px)`;
          purplePupilR.style.transform = `translate(${px}px, ${py}px)`;
        } else if (isLookingAtEachOther) {
          purpleEyes.style.left = "55px";
          purpleEyes.style.top = "65px";
          purplePupilL.style.transform = "translate(3px, 4px)";
          purplePupilR.style.transform = "translate(3px, 4px)";
        } else {
          purpleEyes.style.left = 45 + purplePos.faceX + "px";
          purpleEyes.style.top = 40 + purplePos.faceY + "px";
          const po = calcPupilOffset(purpleEyeL, 5);
          purplePupilL.style.transform = `translate(${po.x}px, ${po.y}px)`;
          purplePupilR.style.transform = `translate(${po.x}px, ${po.y}px)`;
        }

        // ---- Black body ----
        if (isShowingPwd) {
          black.style.transform = "skewX(0deg)";
        } else if (isLookingAway) {
          black.style.transform = "skewX(12deg) translateX(-10px)";
        } else if (isLookingAtEachOther) {
          black.style.transform = `skewX(${(blackPos.bodySkew || 0) * 1.5 + 10}deg) translateX(20px)`;
        } else if (isTyping) {
          black.style.transform = `skewX(${(blackPos.bodySkew || 0) * 1.5}deg)`;
        } else {
          black.style.transform = `skewX(${blackPos.bodySkew}deg)`;
        }

        // Black eyes
        const blackEyes = document.getElementById("black-eyes");
        const blackEyeL = document.getElementById("black-eye-l");
        const blackEyeR = document.getElementById("black-eye-r");
        const blackPupilL = document.getElementById("black-pupil-l");
        const blackPupilR = document.getElementById("black-pupil-r");

        blackEyeL.style.height = isBlackBlinking ? "2px" : "16px";
        blackEyeR.style.height = isBlackBlinking ? "2px" : "16px";

        if (isLoginError) {
          blackEyes.style.left = "15px";
          blackEyes.style.top = "40px";
          blackPupilL.style.transform = "translate(-3px, 4px)";
          blackPupilR.style.transform = "translate(-3px, 4px)";
        } else if (isLookingAway) {
          blackEyes.style.left = "10px";
          blackEyes.style.top = "20px";
          blackPupilL.style.transform = "translate(-4px, -5px)";
          blackPupilR.style.transform = "translate(-4px, -5px)";
        } else if (isShowingPwd) {
          blackEyes.style.left = "10px";
          blackEyes.style.top = "28px";
          blackPupilL.style.transform = "translate(-4px, -4px)";
          blackPupilR.style.transform = "translate(-4px, -4px)";
        } else if (isLookingAtEachOther) {
          blackEyes.style.left = "32px";
          blackEyes.style.top = "12px";
          blackPupilL.style.transform = "translate(0px, -4px)";
          blackPupilR.style.transform = "translate(0px, -4px)";
        } else {
          blackEyes.style.left = 26 + blackPos.faceX + "px";
          blackEyes.style.top = 32 + blackPos.faceY + "px";
          const bo = calcPupilOffset(blackEyeL, 4);
          blackPupilL.style.transform = `translate(${bo.x}px, ${bo.y}px)`;
          blackPupilR.style.transform = `translate(${bo.x}px, ${bo.y}px)`;
        }

        // ---- Orange body ----
        const orangeMouth = document.getElementById("orange-mouth");
        if (isLoginError) {
          orangeMouth.style.left = 80 + orangePos.faceX + "px";
          orangeMouth.style.top = "130px";
        }
        if (isShowingPwd) {
          orange.style.transform = "skewX(0deg)";
        } else {
          orange.style.transform = `skewX(${orangePos.bodySkew}deg)`;
        }

        // Orange eyes
        const orangeEyes = document.getElementById("orange-eyes");
        const orangePupilL = document.getElementById("orange-pupil-l");
        const orangePupilR = document.getElementById("orange-pupil-r");

        if (isLoginError) {
          orangeEyes.style.left = "60px";
          orangeEyes.style.top = "95px";
          orangePupilL.style.transform = "translate(-3px, 4px)";
          orangePupilR.style.transform = "translate(-3px, 4px)";
        } else if (isLookingAway) {
          orangeEyes.style.left = "50px";
          orangeEyes.style.top = "75px";
          orangePupilL.style.transform = "translate(-5px, -5px)";
          orangePupilR.style.transform = "translate(-5px, -5px)";
        } else if (isShowingPwd) {
          orangeEyes.style.left = "50px";
          orangeEyes.style.top = "85px";
          orangePupilL.style.transform = "translate(-5px, -4px)";
          orangePupilR.style.transform = "translate(-5px, -4px)";
        } else {
          orangeEyes.style.left = 82 + orangePos.faceX + "px";
          orangeEyes.style.top = 90 + orangePos.faceY + "px";
          const oo = calcPupilOffset(orangePupilL, 5);
          orangePupilL.style.transform = `translate(${oo.x}px, ${oo.y}px)`;
          orangePupilR.style.transform = `translate(${oo.x}px, ${oo.y}px)`;
        }

        // ---- Yellow body ----
        if (isShowingPwd) {
          yellow.style.transform = "skewX(0deg)";
        } else {
          yellow.style.transform = `skewX(${yellowPos.bodySkew}deg)`;
        }

        // Yellow eyes & mouth
        const yellowEyes = document.getElementById("yellow-eyes");
        const yellowPupilL = document.getElementById("yellow-pupil-l");
        const yellowPupilR = document.getElementById("yellow-pupil-r");
        const yellowMouth = document.getElementById("yellow-mouth");

        if (isLoginError) {
          yellowEyes.style.left = "35px";
          yellowEyes.style.top = "45px";
          yellowPupilL.style.transform = "translate(-3px, 4px)";
          yellowPupilR.style.transform = "translate(-3px, 4px)";
          yellowMouth.style.left = "30px";
          yellowMouth.style.top = "92px";
          yellowMouth.style.transform = "rotate(-8deg)";
        } else if (isLookingAway) {
          yellowEyes.style.left = "20px";
          yellowEyes.style.top = "30px";
          yellowPupilL.style.transform = "translate(-5px, -5px)";
          yellowPupilR.style.transform = "translate(-5px, -5px)";
          yellowMouth.style.left = "15px";
          yellowMouth.style.top = "78px";
          yellowMouth.style.transform = "rotate(0deg)";
        } else if (isShowingPwd) {
          yellowEyes.style.left = "20px";
          yellowEyes.style.top = "35px";
          yellowPupilL.style.transform = "translate(-5px, -4px)";
          yellowPupilR.style.transform = "translate(-5px, -4px)";
          yellowMouth.style.left = "10px";
          yellowMouth.style.top = "88px";
          yellowMouth.style.transform = "rotate(0deg)";
        } else {
          yellowEyes.style.left = 52 + yellowPos.faceX + "px";
          yellowEyes.style.top = 40 + yellowPos.faceY + "px";
          const yo = calcPupilOffset(yellowPupilL, 5);
          yellowPupilL.style.transform = `translate(${yo.x}px, ${yo.y}px)`;
          yellowPupilR.style.transform = `translate(${yo.x}px, ${yo.y}px)`;
          yellowMouth.style.left = 40 + yellowPos.faceX + "px";
          yellowMouth.style.top = 88 + yellowPos.faceY + "px";
          yellowMouth.style.transform = "rotate(0deg)";
        }
      }

      // ============ LOGIN ERROR ANIMATION ============
      let errorRecoverTimer = null;
      const shakeIds = [
        "purple-eyes",
        "black-eyes",
        "orange-eyes",
        "yellow-eyes",
        "yellow-mouth",
        "orange-mouth",
      ];

      function triggerLoginError() {
        // Clear any previous error recovery timer so repeated clicks work
        if (errorRecoverTimer) {
          clearTimeout(errorRecoverTimer);
          errorRecoverTimer = null;
        }

        // Reset shake animation (remove class, force reflow, re-add)
        const shakeEls = shakeIds.map((id) => document.getElementById(id));
        shakeEls.forEach((el) => el.classList.remove("shake-head"));
        // Force reflow to restart animation even on repeated clicks
        void document.body.offsetHeight;

        isLoginError = true;
        isPasswordFocused = false;
        updateCharacters();

        // Show sad mouth on orange
        document.getElementById("orange-mouth").classList.add("visible");

        // Start shake after sad pose settles (the 0.7s body transition)
        setTimeout(() => {
          shakeEls.forEach((el) => el.classList.add("shake-head"));
        }, 350);

        // Recover after 2.5 seconds
        errorRecoverTimer = setTimeout(() => {
          isLoginError = false;
          errorRecoverTimer = null;
          document.getElementById("orange-mouth").classList.remove("visible");
          shakeEls.forEach((el) => el.classList.remove("shake-head"));
          updateCharacters();
        }, 2500);
      }

      // ============ FORM VALIDATION ============
      document.getElementById("login-form").addEventListener("submit", (e) => {
        e.preventDefault();
        const email = emailInput.value.trim();
        const pwd = passwordInput.value;
        const errEl = document.getElementById("error-msg");
        const emailLabel = document.getElementById("email-label");
        const pwdLabel = document.getElementById("password-label");

        // Reset
        errEl.style.display = "none";
        emailInput.classList.remove("error");
        passwordInput.classList.remove("error");
        emailLabel.classList.remove("error-label");
        pwdLabel.classList.remove("error-label");

        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          emailInput.classList.add("error");
          emailLabel.classList.add("error-label");
          errEl.textContent = "Please enter a valid email address.";
          errEl.style.display = "block";
          triggerLoginError();
          return;
        }

        if (!pwd || pwd.length < 6) {
          passwordInput.classList.add("error");
          pwdLabel.classList.add("error-label");
          errEl.textContent = "Password must be at least 6 characters.";
          errEl.style.display = "block";
          triggerLoginError();
          return;
        }

        // Simulate login (always fails for demo to show the animation)
        const btn = document.getElementById("btn-login");
        btn.querySelector(".btn-text").textContent = "Signing in...";
        btn.disabled = true;

        setTimeout(() => {
          btn.querySelector(".btn-text").textContent = "Log In";
          btn.disabled = false;
          errEl.textContent = "Invalid email or password. Please try again.";
          errEl.style.display = "block";
          passwordInput.classList.add("error");
          pwdLabel.classList.add("error-label");
          triggerLoginError();
        }, 1500);
      });

      // Initial render
      updateCharacters();
    </script>
  </body>
</html>
